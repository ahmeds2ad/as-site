<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AS Site</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', Tahoma;
  background:#f4f6f9;
}

/* الشريط العلوي */
nav {
  background:#0b3d91;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:30px;
}

nav a {
  color:white;
  text-decoration:none;
  font-size:18px;
  cursor:pointer;
}

/* الهيدر */
header {
  text-align:center;
  padding:30px;
  background:#1c5ed6;
  color:white;
}

header h1 {
  margin:0;
}

header p {
  margin-top:10px;
  opacity:0.9;
}

/* الأقسام */
.section {
  display:none;
  padding:40px;
}

.active {
  display:block;
}

/* الكروت */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.card {
  background:white;
  width:260px;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  background:#0b3d91;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover {
  background:#092e6b;
}

p {
  color:#333;
}
</style>
</head>

<body>

<!-- القائمة -->
<nav>
  <a onclick="showSection('apps')">البرامج</a>
  <a onclick="showSection('about')">من نحن</a>
  <a onclick="showSection('contact')">تواصل مع المطور</a>
</nav>

<!-- العنوان -->
<header>
  <h1>AS Site</h1>
  <p>تطوير: احمد سعد كشيش</p>
</header>

<!-- البرامج -->
<div id="apps" class="section active">
  <div class="container">

    <div class="card">
      <h2>TMS</h2>
      <p>نظام ادارة الافراد</p>
      <a href="PUT_LINK_HERE">
        <button>تحميل</button>
      </a>
    </div>

  </div>
</div>

<!-- من نحن -->
<div id="about" class="section">
  <h2>من نحن</h2>
  <p>هذا الموقع مخصص لعرض البرامج التي اقوم بتطويرها بشكل بسيط وعملي.</p>
</div>

<!-- تواصل -->
<div id="contact" class="section">
  <h2>تواصل مع المطور</h2>
  <p>البريد الإلكتروني:</p>
  <p><b>ahmedalmutadareb0@gmail.com</b></p>
</div>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
