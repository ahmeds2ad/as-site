<!DOCTYPE html>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:#f5f7fa;
}

/* NAVBAR */
nav {
  background:#0a3d91;
  padding:15px;
  display:flex;
  justify-content:center;
  gap:30px;
}

nav a {
  color:white;
  text-decoration:none;
  font-size:18px;
}

/* HERO */
.hero {
  background:linear-gradient(135deg,#0a3d91,#1f6bdc);
  color:white;
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  margin:0;
  font-size:40px;
}

/* SECTION */
.section {
  padding:40px;
  text-align:center;
}

/* CARDS */
.container {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card {
  background:white;
  width:260px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

button {
  background:#0a3d91;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

/* FOOTER */
footer {
  background:#0a3d91;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>
